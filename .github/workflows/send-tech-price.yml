name: Send RAM/SSD/Laptop Price Email

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:        # lets you trigger it manually from the Actions tab

permissions:
  contents: write   # needed so the last step can push the tech-price-state branch

jobs:
  send-price-email:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser (Chromium)
        # HACOM and Phong Vu load their product grids via client-side JS,
        # so those two categories are rendered in a real headless
        # Chromium tab rather than fetched with a plain HTTP GET.
        # --with-deps also installs the OS-level libraries Chromium needs
        # on the ubuntu-latest runner.
        run: python -m playwright install --with-deps chromium

      - name: Restore dedup state from state branch (if it exists)
        run: |
          git fetch origin tech-price-state:refs/remotes/origin/tech-price-state 2>/dev/null || true
          if git show-ref --quiet refs/remotes/origin/tech-price-state; then
            mkdir -p state
            git show origin/tech-price-state:state/last_price.json > state/last_price.json 2>/dev/null || true
          fi

      - name: Generate email
        env:
          SEND_ONLY_ON_CHANGE: "true"
          TIMEZONE: "Asia/Ho_Chi_Minh"
        run: python ram_ssd_laptop_price_emailer.py generate

      - name: Send email
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TECH_RECIPIENT: ${{ secrets.TECH_RECIPIENT }}
        run: python ram_ssd_laptop_price_emailer.py send

      - name: Persist dedup state to state branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan tech-price-state-tmp
          git rm -rf --cached . > /dev/null
          mkdir -p state
          git add -f state/last_price.json
          git commit -m "Update price state [skip ci]" || echo "No state to commit"
          git push origin tech-price-state-tmp:tech-price-state --force
